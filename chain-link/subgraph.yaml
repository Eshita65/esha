specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: ChainPass
    network: sepolia
    source:
      address: "0x448C46b41c7230DD351805AF370B348F02610284"
      abi: ChainPass
      startBlock: 10688455
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Event
        - CashbackPaid
        - CoordinatorSet
        - OwnershipTransferRequested
        - OwnershipTransferred
        - ResaleCancelled
        - ResaleCompleted
        - ResaleListed
        - ReviewSubmitted
        - StakeSettled
        - TicketPurchased
        - Transfer
        - VRFWinnerRequested
      abis:
        - name: ChainPass
          file: ./abis/ChainPass.json
      eventHandlers:
        - event: EventCreated(indexed uint256,indexed address,string,string,uint256,uint256,uint256,uint256)
          handler: handleEventCreated
        - event: CashbackPaid(indexed uint256,indexed address,uint256,uint256)
          handler: handleCashbackPaid
        - event: CoordinatorSet(address)
          handler: handleCoordinatorSet
        - event: OwnershipTransferRequested(indexed address,indexed address)
          handler: handleOwnershipTransferRequested
        - event: OwnershipTransferred(indexed address,indexed address)
          handler: handleOwnershipTransferred
        - event: ResaleCancelled(indexed uint256,indexed address)
          handler: handleResaleCancelled
        - event: ResaleCompleted(indexed uint256,indexed address,indexed address,uint256)
          handler: handleResaleCompleted
        - event: ResaleListed(indexed uint256,indexed address,uint256)
          handler: handleResaleListed
        - event: ReviewSubmitted(indexed uint256,indexed address,string)
          handler: handleReviewSubmitted
        - event: StakeSettled(indexed uint256,indexed address,uint256,uint256)
          handler: handleStakeSettled
        - event: TicketPurchased(indexed uint256,indexed uint256,indexed address,uint256)
          handler: handleTicketPurchased
        - event: Transfer(indexed address,indexed address,indexed uint256)
          handler: handleTransfer
        - event: VRFWinnerRequested(indexed uint256,indexed uint256)
          handler: handleVRFWinnerRequested
      file: ./src/chain-pass.ts
