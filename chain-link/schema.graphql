type Event @entity(immutable: false) {
  id: ID!
  name: String!
  description: String!
  startTime: BigInt!
  endTime: BigInt!
  location: String!
  creator: Bytes!
}

type CashbackPaid @entity(immutable: true) {
  id: Bytes!
  eventId: BigInt! # uint256
  winner: Bytes! # address
  amount: BigInt! # uint256
  vrfRequestId: BigInt! # uint256
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type CoordinatorSet @entity(immutable: true) {
  id: Bytes!
  vrfCoordinator: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type OwnershipTransferRequested @entity(immutable: true) {
  id: Bytes!
  from: Bytes! # address
  to: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type OwnershipTransferred @entity(immutable: true) {
  id: Bytes!
  from: Bytes! # address
  to: Bytes! # address
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

